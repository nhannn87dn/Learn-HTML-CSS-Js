<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- EXTERNAL -->
    <link rel="stylesheet" href="style.css">
    <!-- INTERNAL -->
    <style>
        /* universal selector */
         *{
            font-size: 14px;
         }

        /*
        h1: selector --> tag name selector
        color: gọi là property (Thuộc tính)
        : phía sau dấu : ==> value (giá trị của thuộc tính)
        */
       
        /* class selector */
        .heading{
            color: blue;
        }

        /* ID selector */
        #heading3 {
            color: purple;
        }
        .cycan{
            color: cyan;
        }
    </style>
</head>
<body>
   <div>
     <h1>Css Syntax</h1>
   </div>
    <h2 class="heading">Heading 2</h2>
    <h3 id="heading3">Heading 3</h3>
    <h4 style="color:red">Salmon</h4>
    <!-- inline -->
    <h5 class="cycan">heading 5</h5>
   <h6 class="cycan">H6</h6>
</body>
</html>
