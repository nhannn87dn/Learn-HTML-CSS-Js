<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*
        universal < tag name < class < ID < inline < !important

        */
        *{
            /* color: red;  color name*/
            /*color: #ff0000;  hex color */
            color: rgb(25, 186, 41)
        }
        .bala{
            color: brown !important;
        }
        .head{
            color: blue;
        }
        
        h1{
            color: red
        }
        #heading {
            color: rgb(51, 44, 51);
        }
    </style>
</head>
<body>
    <h1 id="heading" style="color: black" class="head bala">Thứ tự ưu tiên trong Style Sheets</h1>
</body>
</html>
