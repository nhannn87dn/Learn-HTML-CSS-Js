<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- INTERNAL CSS -->
    <style>
        /*
        h1: selector - tag name
        color: property - thuộc tính css
        red: value - giá trị của thuộc tính
        */
        h1 {
            color: red;
            background-color: yellow;
            font-size: 14px;
            height: 50px;
            /* width: 50%; */
            width: 500px;
        }
    </style>
</head>
<body>
    <div>
        <h1>Hello CSS</h1>
    </div>
    <!-- INLINE CSS -->
    <h2 style="color: red">Hello Heading 2</h2>
    <h3>Heading 3</h3>
</body>
</html>
