<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/global.css">
    <style>
        /* universal selector */
        *{
            font-family: Arial, 'Helvetica', sans-serif;
        }
        /* class selector */
        .heading {
            color: red
        }
        .desc {
            font-size: 30px;
        }
        /* ID selector */
        #head{
            color: blue;
        }
    </style>
</head>
<body>
    <h2 id="head">Heading 2 main</h2>
    <h2 class="heading">Heading 2 v2</h2>
    <p class="heading desc">baba</p>
</body>
</html>
