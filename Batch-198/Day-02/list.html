<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h2>Để tạo ra 1 list thì HTML có 2 thẻ:</h2>
    <h3>List có số thứ tự</h3>
    <ol style="list-style-type:upper-roman;">
        <li>Giặt đồ</li>
        <li>Nấu cơm</li>
        <li>Xem phím</li>
    </ol>
    <h3>List không có số thứ tự</h3>
    <ul style="list-style-type:square;">
        <li>Giặt đồ</li>
        <li>Nấu cơm</li>
        <li>Xem phím</li>
    </ul>
</body>
</html>
