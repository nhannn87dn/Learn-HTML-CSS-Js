<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
     <!-- EXTERNAL STYLE SHEET -->
    <link rel="stylesheet" href="./css/style.css">
    <!-- INTERNAL STYLE SHEET -->
    <style>
        h1 {
            color: red;
            background-color: yellow;
            font-size: 22px;
            font-style: italic;
            width: 50%;
            height: 80px;
        }
        /*
        selector: h1
        color: property
        red: value
        */
        p {
            color: blue;
            font-weight: 800;
        }
        div{
            width: 100px;
        }
    </style>
</head>
<body>
    <div>
        <h1>Hello CSS</h1>
    </div>
    <h2 style="color: brown">Inline <<----- Heading 2</h2>
    <h3>Heading 3</h3>
    <p>CSS property that</p>
</body>
</html>
