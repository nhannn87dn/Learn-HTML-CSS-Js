<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/ex.css">
    <style>
        /* class > tag name > universal */
        .heading{
            color: green;
            font-size: 14px;
        }
        * {
            color: red
        }
        h1 {
            color: blue;
        }
        h1{
            color: purple !important;
        }
        .head {
            color: black;
            font-size: 18px;
            /* font-style: italic; */
        }
        #title{
            color: yellow;
        }
        /* ctrl + / ==>  fkjdkjfdkfdj */
    </style>
</head>
<body>
    <h1 style="color: brown" id="title" class="heading head para">Thứ tự ưu tiên của CSS</h1>
</body>
</html>
