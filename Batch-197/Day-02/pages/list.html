<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<body>
    <h2>Order List -- List có số thứ tự</h2>
    <ol>
        <li>Giặt đồ</li>
        <li>Rửa chén</li>
        <li>Nấu cơm</li>
    </ol>
    <h2>Unorder List - List ko có thứ tự</h2>
    <ul style="list-style-type: circle;">
        <li>Giặt đồ</li>
        <li>Rửa chén</li>
        <li>Nấu cơm</li>
    </ul>
    <h1>Chương 1</h1>
    <ol>
        <li>
            <h3>Intro HTML</h3>
            <ol>
                <li>1.1 dsdsjkjk</li>
            </ol>
            <p>fkjdkf</p>
            <div>kfdjfkdj</div>
        </li>
        <li>Formating text</li>
    </ol>
</body>
</html>
