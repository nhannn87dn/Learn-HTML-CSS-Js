<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            border: 2px solid red;
            width: 50px;
            height: 50px;
        }
        .suggest {
            display: none;
        }
        .show {
            display: block;
        }
    </style>
</head>
<body>
    <input onkeypress="console.log(' da nhan phim')" onfocus="onHandleKeyword()" type="text" name="keyword">
     <p class="suggest">
        tu khoa goi y
     </p>
    
    <!-- <div onmouseleave="console.log('re khoi div')" onmouseenter="console.log('re vao div')" onclick="console.log('Bạn đã click vào div')">
        Div
    </div>
    <button onclick="console.log('Bạn đã click vào submit')">Submit</button>
     -->
    <script>
        function onHandleKeyword(){
           const e =  document.querySelector('.suggest')
           e.classList.toggle('show')
        }
    </script>
</body>
</html>
