<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 400px;

        }
        table tr td,
        table tr th{
            border: 1px solid #333;
            padding: 8px 12px;
        }
        table tbody tr td:first-child {
            text-align: center;
            width: 40px;
        }
        .vertical {
            vertical-align: bottom;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
            <th>STT</th>
            <th>Tên</th>
            <th>Khoá</th>
        </tr>
        </thead>
        <tbody>
            <tr>
            <td>1</td>
            <td>Thắng</td>
            <td>MERN</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Đặt</td>
            <td rowspan="2" class="vertical">Java</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Tuấn</td>
        </tr>
         <tr>
            <td>4</td>
            <td>Nam</td>
            <td></td>
        </tr>
        <tfoot>
            <tr>
            <td colspan="2">Total</td>
            <td>4</td>
        </tr>
        </tfoot>
        </tbody>
    </table>
</body>
</html>
